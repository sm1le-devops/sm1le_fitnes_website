<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Анкета — sm1le.fitness</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=3">
    <style>
        :root {
            --bg: #0F172A;
            --card-bg: #1E293B;
            --accent: #F97316;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, sans-serif;
        }

        .app-wrapper {
            padding: 40px 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .greeting h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .greeting p {
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .auth-form {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        select,
        input {
            background: #0F172A;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        /* Единый стиль для кнопки */
        .btn-generate {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Стиль для лоадера */
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="app-wrapper">
        <div class="greeting">
            <h1>Почти готово!</h1>
            <p>Заполни анкету, и наш ИИ составит твой персональный план тренировок.</p>
        </div>

        <form id="ai-form" class="auth-form" method="POST" action="/generate-plan/{{ plan_id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="input-group">
                <label>Твой опыт в спорте</label>
                <select name="experience" required>
                    <option value="beginner">Новичок (0-1 год)</option>
                    <option value="middle">Средний (1-3 года)</option>
                    <option value="pro">Профи (3+ года)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Травмы или ограничения</label>
                <input type="text" name="injuries" value="нет" required>
            </div>

            <div class="input-group">
                <label>Где тренируешься?</label>
                <select name="equipment">
                    <option value="gym">Тренажерный зал (полный набор)</option>
                    <option value="home">Дом (гантели или без веса)</option>
                    <option value="street">Улица (турники, брусья)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ваш пол</label>
                <select name="gender" required>
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>
            </div>

            <div class="input-group">
                <label>Возраст</label>
                <input type="number" name="age" placeholder="Например: 25" required>
            </div>

            <div class="input-group">
                <label>Вес (кг)</label>
                <input type="number" step="0.1" name="weight" placeholder="Например: 75.5" required>
            </div>

            <div class="input-group">
                <label>Рост (см)</label>
                <input type="number" name="height" placeholder="Например: 180" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-generate">
                <span id="btnText">🚀 Сгенерировать мой план</span>
                <div id="loader" class="loader"></div>
            </button>

        </form>
    </div>

    <script>
        document.getElementById('ai-form').onsubmit = function () {
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            // Блокируем кнопку, чтобы не нажали дважды
            btn.disabled = true;
            text.innerText = "ИИ составляет план...";
            loader.style.display = "inline-block";
        };
    </script>
</body>

</html>
