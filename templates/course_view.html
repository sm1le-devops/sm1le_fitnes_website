<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ plan.title if plan else 'План питания' }} — sm1le.fitness</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=3">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg: #0F172A;
            --card: #1E293B;
            --accent: #F97316;
            --text: #F8FAFC;
            --muted: #94A3B8;
            --success: #22C55E;
            --nutrition: #8B5CF6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; padding-bottom: 60px; }

        .header { padding: 20px 16px; background: var(--card); border-bottom: 1px solid #2D3748; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 8px 0 0 0; font-size: 1.2rem; color: var(--accent); font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .content { padding: 16px; }

        /* --- НОВОЕ: Прогресс-бар недель --- */
        .weeks-progress {
            display: flex;
            justify-content: space-between;
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(249, 115, 22, 0.2);
        }
        .week-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex: 1;
            position: relative;
        }
        .week-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
        }
        .week-step.active .week-circle { background: var(--accent); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .week-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

        /* --- НОВОЕ: Кнопка замен --- */
        .swap-container {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #334155;
        }
        .swap-btn {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--nutrition);
            color: var(--nutrition);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
        }
        .swap-panel {
            display: none;
            background: #1e1e2e;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.9rem;
            border-left: 3px solid var(--nutrition);
        }

        .meal-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .meal-time { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 5px; }
        .meal-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; }
        
        .macros { display: flex; gap: 10px; margin: 15px 0; background: rgba(15, 23, 42, 0.5); padding: 10px; border-radius: 12px; }
        .macro-item { text-align: center; flex: 1; }
        .macro-val { display: block; font-weight: 700; color: var(--text); }
        .macro-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }

        .purchased-badge { background: rgba(34, 197, 94, 0.1); color: var(--success); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; border: 1px solid rgba(34, 197, 94, 0.2); }
        .download-btn { text-decoration: none; padding: 10px 16px; border-radius: 12px; background: var(--success); color: white; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

<body>

    <div class="header">
        <a href="/auth/welcome" style="color: var(--muted); text-decoration: none;">← Назад</a>
        <h1>🥗 {{ plan.title if plan else 'План питания' }}</h1>
    </div>

    <div class="content">
        {% if not is_purchased %}
        <div style="text-align: center; padding: 40px 20px;">
            <div style="background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid var(--accent);">
                <h2>🥩 Твой рацион PRO</h2>
                <p style="color: var(--muted)">Месячная программа питания с автоматическими заменами продуктов.</p>
                <div style="font-size: 2rem; font-weight: 800; margin: 20px 0;">{{ plan.price }} ₽</div>
                <button id="stripe-button" style="width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700;">
                    КУПИТЬ ДОСТУП
                </button>
            </div>
        </div>
        {% else %}
        
        <div class="weeks-progress">
            <div class="week-step active">
                <div class="week-circle">1</div>
                <span class="week-label">Неделя</span>
            </div>
            <div class="week-step">
                <div class="week-circle">2</div>
                <span class="week-label">Неделя</span>
            </div>
            <div class="week-step">
                <div class="week-circle">3</div>
                <span class="week-label">Неделя</span>
            </div>
            <div class="week-step">
                <div class="week-circle">4</div>
                <span class="week-label">Неделя</span>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span class="purchased-badge">✓ ТВОЙ ПЛАН НА СЕГОДНЯ</span>
            <a href="/course/{{ plan_id }}/download" class="download-btn">📄 PDF</a>
        </div>

        <div id="aiPlanContainer">
            </div>

        <div class="meal-card" id="globalSwapCard" style="display: none;">
            <button class="swap-btn" onclick="toggleSwaps()">
                <span>🔄</span> Варианты замены продуктов
            </button>
            <div id="swapPanel" class="swap-panel">
                </div>
        </div>

        {% endif %}
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script id="plan-data-raw" type="application/json">
        {{ plan_json | tojson | safe if plan_json else 'null' }}
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawContent = document.getElementById('plan-data-raw').textContent;
            const container = document.getElementById('aiPlanContainer');
            const swapCard = document.getElementById('globalSwapCard');
            const swapPanel = document.getElementById('swapPanel');
            
            if (container && rawContent !== 'null') {
                try {
                    const data = JSON.parse(rawContent);
                    
                    // Если это сложный JSON с неделями
                    if (data.weeks) {
                        renderJsonPlan(data, container);
                        if (data.swap_options) {
                            renderSwaps(data.swap_options, swapPanel, swapCard);
                        }
                    } else {
                        // Если это просто строка Markdown
                        container.innerHTML = `<div class="meal-card"><div class="markdown-content">${marked.parse(data)}</div></div>`;
                    }
                } catch (e) {
                    container.innerHTML = `<div class="meal-card"><div class="markdown-content">${marked.parse(rawContent.trim())}</div></div>`;
                }
            }
        });

        function renderJsonPlan(data, container) {
            // Берем 1-ю неделю и 1-й день для примера (или текущий день)
            const day = data.weeks[0].days[0];
            let html = `<h3>${day.day}</h3>`;
            
            day.meals.forEach(meal => {
                html += `
                <div class="meal-card">
                    <div class="meal-time">${meal.icon} ${meal.time} — ${meal.type}</div>
                    <div class="meal-title">${meal.name}</div>
                    <p style="font-size:0.9rem; color: var(--muted)">${meal.recipe}</p>
                    <div class="macros">
                        <div class="macro-item"><span class="macro-val">${meal.macros.K}</span><span class="macro-label">Ккал</span></div>
                        <div class="macro-item"><span class="macro-val">${meal.macros.B}г</span><span class="macro-label">Белки</span></div>
                        <div class="macro-item"><span class="macro-val">${meal.macros.J}г</span><span class="macro-label">Жиры</span></div>
                        <div class="macro-item"><span class="macro-val">${meal.macros.U}г</span><span class="macro-label">Угли</span></div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderSwaps(swaps, panel, card) {
            card.style.display = 'block';
            let html = '<strong>Чем заменить:</strong><br><br>';
            for (const [category, items] of Object.entries(swaps)) {
                const names = {protein: 'Белки', carbs: 'Углеводы', fats: 'Жиры'};
                html += `<p><b>${names[category] || category}:</b> ${items.join(', ')}</p>`;
            }
            panel.innerHTML = html;
        }

        function toggleSwaps() {
            const panel = document.getElementById('swapPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Stripe Logic (без изменений)
        const stripeBtn = document.getElementById('stripe-button');
        if (stripeBtn) {
            const stripe = Stripe('{{ stripe_publishable_key }}');
            stripeBtn.onclick = async () => {
                const res = await fetch('/create-checkout-session/{{ plan_id }}', { method: 'POST' });
                const session = await res.json();
                if (session.id) await stripe.redirectToCheckout({ sessionId: session.id });
            };
        }
    </script>
</body>
</html>
