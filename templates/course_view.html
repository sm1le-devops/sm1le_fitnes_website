<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ plan.title if plan else 'Курс' }}</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --accent: #F97316; --text: #F8FAFC; --muted: #94A3B8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; padding-bottom: 50px; }
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #2D3748; }
        .content { padding: 15px; }
        .day-btn { padding: 10px 15px; margin-right: 8px; background: var(--card); border: 1px solid #334155; color: white; border-radius: 8px; cursor: pointer; }
        .day-btn.active { background: var(--accent); border-color: var(--accent); }
        .exercise-card { background: var(--card); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #334155; }
        .video { width: 100%; aspect-ratio: 16/9; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <a href="/auth/welcome" style="color: var(--muted); text-decoration: none;">← Назад</a>
    <h1>{{ plan.title if plan else 'План не найден' }}</h1>
</div>

<div class="content">
    <div id="daySelector">
        {% if plan and plan.days %}
            {% for day in plan.days %}
            <button class="day-btn {% if loop.first %}active{% endif %}" onclick="showDay({{ loop.index0 }})">
                День {{ loop.index }}
            </button>
            {% endfor %}
        {% endif %}
    </div>

    <div id="exerciseList"></div>
</div>

<script>
    // Получаем данные. Если plan пришел пустой, ставим пустой объект.
    const planData = {{ plan | tojson | safe if plan else '{}' }};
    
    function showDay(index) {
        const container = document.getElementById('exerciseList');
        
        // Проверки на наличие данных
        if (!planData.days || !planData.days[index]) {
            container.innerHTML = `<p style="color:var(--muted)">Данные для этого дня отсутствуют в plans.json</p>`;
            return;
        }

        document.querySelectorAll('.day-btn').forEach((b, i) => b.classList.toggle('active', i === index));

        const day = planData.days[index];
        container.innerHTML = `
            <h2>${day.title}</h2>
            <p style="color: var(--muted)">${day.description || ''}</p>
            ${(day.exercises || []).map(ex => `
                <div class="exercise-card">
                    <h3>${ex.name}</h3>
                    <p style="color: var(--muted)">${ex.sets} подходов по ${ex.reps} раз</p>
                    ${ex.video_id ? `<iframe class="video" src="https://www.youtube.com/embed/${ex.video_id}" frameborder="0" allowfullscreen></iframe>` : ''}
                </div>
            `).join('')}
        `;
    }

    // Запуск первого дня
    document.addEventListener('DOMContentLoaded', () => {
        if (planData && planData.days) showDay(0);
        else document.getElementById('exerciseList').innerHTML = "Ошибка: В файле plans.json нет раздела 'days'.";
    });
</script>
</body>
</html>
