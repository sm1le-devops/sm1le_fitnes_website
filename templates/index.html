<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>sm1le.fitness — Похудей или накачайся с нами</title>
  <style>
    :root {
      --bg: #0F172A;
      --card-bg: #1E293B;
      --accent: #F97316;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }

    .app-wrapper { padding: 20px 16px 100px 16px; }

    /* Шапка */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    
    .header-right { display: flex; align-items: center; gap: 12px; }

    /* Стили для кнопки входа */
    .btn-auth {
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(249, 115, 22, 0.2);
      transition: 0.3s;
    }

    /* Стили для аватарки в шапке (вместо кнопки Sign In) */
    .user-avatar-link {
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      overflow: hidden;
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.3);
    }
    .user-avatar-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Приветствие */
    .greeting { margin-bottom: 24px; }
    .greeting h1 { font-size: 26px; margin: 0; font-weight: 800; line-height: 1.2; }
    .greeting p { color: var(--text-muted); margin: 8px 0 0; font-size: 15px; }

    /* Карточки планов */
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .plan-card {
      position: relative; width: 100%; height: 200px;
      border-radius: 24px; margin-bottom: 16px;
      background-size: cover; background-position: center;
      overflow: hidden; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 20px;
      border: 2px solid transparent; transition: 0.3s ease;
      cursor: pointer;
    }
    .plan-card.unlocked { border-color: #22C55E; }
    .plan-card::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(15, 23, 42, 0.9) 100%);
    }
    .plan-info { position: relative; z-index: 2; }
    .plan-info h3 { margin: 0; font-size: 20px; font-weight: 700; }
    .unlock-badge {
      position: absolute; top: 16px; left: 16px;
      background: #22C55E; color: white;
      padding: 5px 10px; border-radius: 8px;
      font-size: 11px; font-weight: 700; z-index: 2;
      display: none;
    }
    .unlocked .unlock-badge { display: block; }
    .price-tag {
      position: absolute; top: 16px; right: 16px;
      background: var(--accent); padding: 6px 12px; border-radius: 12px;
      font-weight: 800; font-size: 14px; z-index: 2;
    }

    /* Навбар */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
      background: #FFFFFF; display: flex; justify-content: space-around;
      align-items: center; border-top-left-radius: 24px; border-top-right-radius: 24px;
      z-index: 100;
    }
    .nav-item { text-decoration: none; color: #94A3B8; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; }
    .nav-item.active { color: var(--accent); }
    .nav-icon { width: 24px; height: 24px; background: #F1F5F9; border-radius: 8px; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header class="top-header">
      <div class="logo">sm1le.fitness</div>
      <div class="header-right">
        <div id="authContent">
            <a href="/auth/login" class="btn-auth">Sign In</a>
        </div>
      </div>
    </header>

    <div class="greeting">
      <h1 id="welcomeTitle">Начни меняться прямо сейчас!</h1>
      <p id="welcomeSub">Похудей или накачайся с нами</p>
    </div>

    <h2 class="section-title">Твой выбор</h2>

    <div id="plan-weight_loss" class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600');" onclick="selectPlan('weight_loss')">
      <div class="unlock-badge">ДОСТУПНО</div>
      <div class="price-tag">990 ₽</div>
      <div class="plan-info"><h3>Интенсивное похудение</h3><p>4 недели • Жиросжигание</p></div>
    </div>

    <div id="plan-muscle_gain" class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600');" onclick="selectPlan('muscle_gain')">
      <div class="unlock-badge">ДОСТУПНО</div>
      <div class="price-tag">1490 ₽</div>
      <div class="plan-info"><h3>Набор массы: PRO</h3><p>8 недель • Сила и рельеф</p></div>
    </div>

    <div class="footer" style="text-align: center; color: #475569; padding-top: 20px;">sm1le.fitness s.r.o</div>
  </div>

  <nav class="nav-bar">
    <a href="/" class="nav-item active"><div class="nav-icon"></div><span>Главная</span></a>
    <a href="/workouts" class="nav-item"><div class="nav-icon"></div><span>Планы</span></a>
    <a href="/auth/profile" class="nav-item"><div class="nav-icon"></div><span>Профиль</span></a>
  </nav>

  <script>
    async function checkAuth() {
      try {
        const response = await fetch('/api/check-auth');
        if (response.ok) {
          const data = await response.json();
          const user = data.user;
          
          // 1. Меняем приветствие
          document.getElementById('welcomeTitle').innerText = `Привет, ${user.username}!`;
          document.getElementById('welcomeSub').innerText = `Твой прогресс под контролем.`;
          
          // 2. Заменяем кнопку "Sign In" на КРУГЛУЮ АВАТАРКУ
          // Если у юзера нет аватара в базе, используем стандартную картинку
          const avatarUrl = user.avatar ? `/static/avatars/${user.avatar}` : '/static/default-avatar.png';
          
          document.getElementById('authContent').innerHTML = `
            <a href="/auth/profile" class="user-avatar-link">
              <img src="${avatarUrl}" alt="Profile" onerror="this.src='/static/default-avatar.png'">
            </a>
          `;

          // 3. Подсвечиваем купленные планы
          if (user.current_plan) {
            const activeCard = document.getElementById(`plan-${user.current_plan}`);
            if (activeCard) {
                activeCard.classList.add('unlocked');
                const price = activeCard.querySelector('.price-tag');
                if (price) price.style.display = 'none';
            }
          }
        }
      } catch (err) {
        console.log("Пользователь не авторизован");
      }
    }

    function selectPlan(planId) {
      window.location.href = `/application?plan=${planId}`;
    }

    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
