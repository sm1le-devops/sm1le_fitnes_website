<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitLife - Твой план тренировок</title>
  <link rel="icon" type="image/png" href="/static/ava.png">
  <style>
    :root {
      --bg-dark: #121922;      /* Глубокий синий фон */
      --card-bg: #1c2531;      /* Цвет карточек */
      --accent: #f4743b;       /* Оранжевый акцент */
      --text-main: #ffffff;
      --text-gray: #a0aaba;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Верхняя панель (Приветствие) */
    .header {
      padding: 30px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .greeting h1 {
      font-size: 24px;
      margin: 0;
      font-weight: 700;
    }

    .greeting p {
      color: var(--text-gray);
      margin: 5px 0 0;
      font-size: 14px;
    }

    .auth-buttons a {
      text-decoration: none;
      color: var(--text-main);
      font-size: 14px;
      background: var(--card-bg);
      padding: 8px 15px;
      border-radius: 10px;
      margin-left: 10px;
      border: 1px solid #344155;
    }

    /* Секция планов тренировок */
    .content-section {
      padding: 20px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    /* Карточки планов (как в макете) */
    .workout-card {
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('/static/GYMA.jpg');
      background-size: cover;
      background-position: center;
      height: 160px;
      border-radius: 20px;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 15px;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .workout-card:active {
      transform: scale(0.98);
    }

    .workout-card h3 {
      margin: 0;
      font-size: 18px;
    }

    .workout-card p {
      margin: 5px 0 0;
      font-size: 12px;
      color: #ddd;
    }

    .price-tag {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--accent);
      padding: 5px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 12px;
    }

    /* Нижняя навигация */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ffffff;
      height: 70px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .nav-item {
      text-decoration: none;
      color: #8e99a7;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
      background: #eef1f4; /* Заглушка под иконку */
      border-radius: 6px;
    }

  </style>
</head>
<body>

  <header class="header">
    <div class="greeting">
      <h1 id="user-name">Привет, Гость!</h1>
      <p>Выбери свой путь к успеху</p>
    </div>
    <div class="auth-buttons" id="auth-zone">
      <a href="/auth/login">Вход</a>
    </div>
  </header>

  <main class="content-section">
    <h2>Предлагаемые планы</h2>
    
    <div class="workout-card" onclick="selectPlan('weight_loss')">
        <div class="price-tag">От 1500₽</div>
        <h3>Интенсивное похудение</h3>
        <p>4 недели • Жиросжигание • Для любого уровня</p>
    </div>

    <div class="workout-card" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('/static/mass.jpg');" onclick="selectPlan('muscle_gain')">
        <div class="price-tag">От 2000₽</div>
        <h3>Набор мышечной массы</h3>
        <p>8 недель • Силовые тренировки • Профи</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-item active">
      <div class="nav-icon"></div>
      <span>Главная</span>
    </a>
    <a href="/workouts" class="nav-item">
      <div class="nav-icon"></div>
      <span>Тренировки</span>
    </a>
    <a href="/profile" class="nav-item">
      <div class="nav-icon"></div>
      <span>Профиль</span>
    </a>
  </nav>

  <script>
    // Простейшая проверка: залогинен ли пользователь (по наличию токена)
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('access_token');
        if (token) {
            document.getElementById('user-name').innerText = "Привет, Атлет!";
            document.getElementById('auth-zone').style.display = 'none';
        }
    });

    function selectPlan(planType) {
        const token = localStorage.getItem('access_token');
        if (!token) {
            alert("Чтобы выбрать план и подать заявку, нужно войти в аккаунт");
            window.location.href = "/auth/login";
        } else {
            // Переход на страницу заявки с параметром пола/плана
            window.location.href = `/application?plan=${planType}`;
        }
    }
  </script>
</body>
</html>
