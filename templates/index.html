<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>sm1le.fitness — Твой путь к результату</title>
  <style>
    :root {
      --bg: #0F172A;
      --card-bg: #1E293B;
      --accent: #F97316;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --success: #22C55E;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }

    .app-wrapper {
      padding: 20px 16px 100px 16px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Шапка */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 20px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .user-avatar-link {
      display: block;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      overflow: hidden;
      transition: 0.3s;
    }

    .user-avatar-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Приветствие */
    .greeting {
      margin-bottom: 28px;
    }

    .greeting h1 {
      font-size: 28px;
      margin: 0;
      font-weight: 800;
    }

    .greeting p {
      color: var(--text-muted);
      margin: 6px 0 0;
      font-size: 16px;
    }

    /* Карточки планов */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plan-card {
      position: relative;
      width: 100%;
      height: 210px;
      border-radius: 28px;
      margin-bottom: 20px;
      background-size: cover;
      background-position: center;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
      border: 2px solid transparent;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .plan-card:active {
      transform: scale(0.97);
    }

    .plan-card.unlocked {
      border-color: var(--success);
    }

    .plan-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 10%, rgba(15, 23, 42, 0.95) 100%);
    }

    .plan-info {
      position: relative;
      z-index: 2;
    }

    .plan-info h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }

    .plan-info p {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    .unlock-badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--success);
      color: white;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      z-index: 2;
      display: none;
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
    }

    .unlocked .unlock-badge {
      display: block;
    }

    .unlocked .price-tag {
      display: none;
    }

    .price-tag {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(249, 115, 22, 0.9);
      backdrop-filter: blur(4px);
      padding: 8px 14px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 15px;
      z-index: 2;
    }

    /* Навбар (Tab Bar) */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 15px;
      z-index: 1000;
    }

    .tab-item {
      text-decoration: none;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      transition: 0.3s;
      width: 25%;
      cursor: pointer;
    }

    .tab-item.active {
      color: var(--accent);
    }

    .tab-item svg {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
      transition: 0.3s;
    }

    .tab-item.active svg {
      transform: translateY(-2px);
    }

    .footer-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="app-wrapper">
    <header class="top-header">
      <div class="logo">sm1le.fitness</div>
      <div id="authContent">
      </div>
    </header>

    <div class="greeting">
      <h1 id="welcomeTitle">Начни меняться!</h1>
      <p id="welcomeSub">Выберите программу тренировок</p>
    </div>

    <h2 class="section-title">🔥 Популярные планы</h2>

    <div id="plan-weight_loss" class="plan-card"
      style="background-image: url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600');"
      onclick="selectPlan('weight_loss')">
      <div class="unlock-badge">КУПЛЕНО</div>
      <div class="price-tag">990 $</div>
      <div class="plan-info">
        <h3>Интенсивное похудение</h3>
        <p>4 недели • Жиросжигание • Дом/Зал</p>
      </div>
    </div>

    <div id="plan-muscle_gain" class="plan-card"
      style="background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600');"
      onclick="selectPlan('muscle_gain')">
      <div class="unlock-badge">КУПЛЕНО</div>
      <div class="price-tag">1490 $</div>
      <div class="plan-info">
        <h3>Набор массы: PRO</h3>
        <p>8 недель • Сила и рельеф • Зал</p>
      </div>
    </div>

    <div class="footer-text">sm1le.fitness s.r.o • 2024</div>
  </div>

  <nav class="tab-bar">
    <a href="/" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>Главная</span>
    </a>
    <a href="/auth/welcome" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
        <line x1="6" y1="1" x2="6" y2="4"></line>
        <line x1="10" y1="1" x2="10" y2="4"></line>
        <line x1="14" y1="1" x2="14" y2="4"></line>
      </svg>
      <span>Планы</span>
    </a>
    <a onclick="handleProfileClick()" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Профиль</span>
    </a>
  </nav>

  <script>
    let isAuthorized = false;

    async function checkAuth() {
      try {
        const response = await fetch('/api/check-auth');
        if (response.ok) {
          isAuthorized = true;
          const data = await response.json();
          const user = data.user;

          document.getElementById('welcomeTitle').innerText = `Привет, ${user.username}!`;
          document.getElementById('welcomeSub').innerText = `Твой прогресс под контролем.`;

          const avatarUrl = user.avatar ? `/static/avatars/${user.avatar}` : '/static/default-avatar.png';

          document.getElementById('authContent').innerHTML = `
            <a href="/auth/profile" class="user-avatar-link">
              <img src="${avatarUrl}" alt="Profile" onerror="this.src='/static/default-avatar.png'">
            </a>
          `;

          if (user.current_plan) {
            const activeCard = document.getElementById(`plan-${user.current_plan}`);
            if (activeCard) {
              activeCard.classList.add('unlocked');
            }
          }
        } else {
          isAuthorized = false;
        }
      } catch (err) {
        isAuthorized = false;
      }
    }

    // Логика перехода: если авторизован -> profile, если нет -> register
    function handleProfileClick() {
      if (isAuthorized) {
        window.location.href = "/auth/profile";
      } else {
        window.location.href = "/auth/register";
      }
    }

    // Внутри <script> в index.html

    function selectPlan(planId) {
      if (window.navigator.vibrate) window.navigator.vibrate(10);

      // Если пользователь авторизован — ведем на welcome, если нет — на регистрацию
      if (isAuthorized) {
        window.location.href = "/auth/welcome";
      } else {
        window.location.href = "/auth/register";
      }
    }
  </script>
</body>

</html>
