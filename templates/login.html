<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Вход | sm1le.fitness</title>
  <style>
    :root { --bg: #0F172A; --card-bg: #1E293B; --accent: #F97316; --text: #F8FAFC; --text-muted: #94A3B8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; }
    
    /* Логотип СЛЕВА вверху */
    .top-logo {
      position: absolute; top: 20px; left: 20px;
      text-decoration: none; color: var(--accent);
      font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
      z-index: 10;
    }

    .auth-card { background: var(--card-bg); padding: 32px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); margin: 16px; position: relative; z-index: 1; }
    h2 { text-align: center; margin: 0 0 24px 0; font-size: 24px; }
    input { width: 100%; padding: 14px; margin-bottom: 16px; border-radius: 12px; border: 1px solid #334155; background: #0F172A; color: white; outline: none; font-size: 16px; }
    input:focus { border-color: var(--accent); }
    .btn-auth { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
    .btn-auth:active { transform: scale(0.98); }
    
    .footer-links { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text); }
    .footer-links a { color: var(--accent); text-decoration: none; font-weight: 600; }
    #message { color: #ef4444; text-align: center; margin-bottom: 10px; font-size: 14px; min-height: 18px; }
  </style>
</head>
<body>
  <a href="/" class="top-logo">sm1le.fitness</a>
  <div class="auth-card">
    <h2>Вход</h2>
    <div id="message"></div>
    <form id="login-form">
      <input type="text" name="username" placeholder="Логин" required>
      <input type="password" name="password" placeholder="Пароль" required>
      <button type="submit" class="btn-auth">Войти</button>
    </form>
    <div class="footer-links">
      Нет аккаунта? <a href="/auth/register">Создать</a>
    </div>
  </div>
  <script>
    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(Object.fromEntries(formData))
      });
      if (res.ok) window.location.href = '/auth/profile';
      else document.getElementById('message').innerText = 'Ошибка входа';
    };
  </script>
</body>
</html>
