<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Регистрация | sm1le.fitness</title>
  <style>
    :root { --bg: #0F172A; --card-bg: #1E293B; --accent: #F97316; --text: #F8FAFC; --text-muted: #94A3B8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; overflow: hidden; }
    
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .top-logo {
      position: absolute; top: 20px; left: 20px;
      text-decoration: none; color: var(--accent);
      font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
      z-index: 10; transition: transform 0.3s;
    }
    .top-logo:hover { transform: scale(1.05); }

    .auth-card { 
      background: var(--card-bg); padding: 32px; border-radius: 24px; 
      width: 100%; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); 
      margin: 16px; position: relative; z-index: 1;
      animation: fadeInUp 0.6s ease-out;
    }

    h2 { text-align: center; margin: 0; font-size: 24px; }
    p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 14px; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; margin-left: 4px; }
    input { 
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; 
      background: #0F172A; color: white; outline: none; font-size: 16px; 
      transition: all 0.3s; 
    }
    input:focus { border-color: var(--accent); transform: scale(1.01); background: #161e31; }
    
    .btn-register { 
      width: 100%; padding: 16px; border-radius: 14px; border: none; 
      background: var(--accent); color: white; font-weight: bold; 
      cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; 
    }
    .btn-register:active { transform: scale(0.97); }
    
    .footer-text { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text); }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    #message { text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 18px; }
  </style>
</head>
<body>
  <a href="/" class="top-logo">sm1le.fitness</a>
  <div class="auth-card">
    <h2>Создать аккаунт</h2>
    <p class="subtitle">Начни свой путь к идеальному телу</p>
    <div id="message"></div>
    <form id="register-form">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="Придумайте логин" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Минимум 6 символов" required>
      </div>
      <button type="submit" class="btn-register">Зарегистрироваться</button>
    </form>
    <div class="footer-text">
      Уже есть аккаунт? <a href="/auth/login">Войти</a>
    </div>
  </div>

  <script>
    document.getElementById('register-form').onsubmit = async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('message');
      
      // Сброс стиля сообщения
      msgEl.innerText = 'Регистрация...';
      msgEl.style.color = 'var(--text-muted)';

      // 1. Собираем данные из формы в объект
      const formData = new FormData(e.target);
      const jsonData = Object.fromEntries(formData.entries());

      try {
        // 2. Отправляем запрос как JSON
        const res = await fetch('/auth/register', { 
          method: 'POST', 
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(jsonData) 
        });

        const data = await res.json();

        if (res.ok) {
          msgEl.style.color = '#22c55e';
          msgEl.innerText = 'Успех! Переходим ко входу...';
          setTimeout(() => window.location.href = '/auth/login', 1500);
        } else {
          msgEl.style.color = '#ef4444';
          // Если ошибка в формате FastAPI (массив detail), выводим первое сообщение
          if (Array.isArray(data.detail)) {
            msgEl.innerText = data.detail[0].msg;
          } else {
            msgEl.innerText = data.detail || 'Ошибка регистрации';
          }
        }
      } catch (err) {
        msgEl.style.color = '#ef4444';
        msgEl.innerText = 'Ошибка соединения с сервером';
      }
    };
  </script>
</body>
</html>
