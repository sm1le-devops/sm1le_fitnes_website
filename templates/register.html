<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Регистрация | sm1le.fitness</title>
  <style>
    :root { --bg: #0F172A; --card-bg: #1E293B; --accent: #F97316; --text: #F8FAFC; --text-muted: #94A3B8; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; }
    
    /* Логотип СЛЕВА вверху */
    .top-logo {
      position: absolute; top: 20px; left: 20px;
      text-decoration: none; color: var(--accent);
      font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
      z-index: 10;
    }

    .auth-card { background: var(--card-bg); padding: 32px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); margin: 16px; position: relative; z-index: 1; }
    h2 { text-align: center; margin: 0; font-size: 24px; }
    p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 14px; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; margin-left: 4px; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0F172A; color: white; outline: none; font-size: 16px; }
    input:focus { border-color: var(--accent); }
    
    .btn-register { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    
    .footer-text { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text); }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    #message { color: #ef4444; text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 18px; }
  </style>
</head>
<body>
  <a href="/" class="top-logo">sm1le.fitness</a>
  <div class="auth-card">
    <h2>Создать аккаунт</h2>
    <p class="subtitle">Начни свой путь к идеальному телу</p>
    <div id="message"></div>
    <form id="register-form">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="Придумайте логин" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="example@mail.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Минимум 6 символов" required>
      </div>
      <button type="submit" class="btn-register">Зарегистрироваться</button>
    </form>
    <div class="footer-text">
      Уже есть аккаунт? <a href="/auth/login">Войти</a>
    </div>
  </div>
  <script>
    document.getElementById('register-form').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const res = await fetch('/auth/register', {
        method: 'POST',
        body: formData
      });
      if (res.ok) window.location.href = '/auth/login';
      else {
        const data = await res.json();
        document.getElementById('message').innerText = data.detail || 'Ошибка регистрации';
      }
    };
  </script>
</body>
</html>
