<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ plan.title }} — sm1le.fitness</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=3">
    <link rel="apple-touch-icon" href="/static/favicon.png">
    <link rel="icon" sizes="192x192" href="/static/favicon.png">
    <style>
        :root {
            --bg: #0F172A;
            --card: #1E293B;
            --accent: #F97316;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Шапка с картинкой: уменьшена высота для мобильных */
        .hero {
            position: relative;
            width: 100%;
            height: 35vh;
            background: url('{{ plan.image }}') center/cover no-repeat;
            transition: height 0.3s ease;
        }

        /* На планшетах и ПК фото может быть больше */
        @media (min-width: 768px) {
            .hero {
                height: 50vh;
            }
        }

        /* Плотный градиент для исключения щелей */
        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(15, 23, 42, 0) 50%,
                    rgba(15, 23, 42, 0.8) 80%,
                    var(--bg) 100%);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 16px;
            z-index: 10;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-content {
            position: relative;
            padding: 0 20px 120px 20px;
            /* Наплыв на фото увеличен для плотности */
            margin-top: -60px;
            z-index: 2;
        }

        .category-tag {
            display: inline-block;
            background: rgba(249, 115, 22, 0.15);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .description {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* Компактная сетка параметров */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .info-card {
            background: var(--card);
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-card span {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-card strong {
            font-size: 15px;
            color: var(--text);
        }

        h3 {
            font-size: 18px;
            margin: 24px 0 12px 0;
        }

        .features-list {
            color: var(--text-muted);
            padding-left: 20px;
            margin: 0;
        }

        .features-list li {
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* Фиксированная кнопка внизу */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            z-index: 100;
        }

        .buy-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
            transition: transform 0.2s;
        }

        .buy-button:active {
            transform: scale(0.96);
        }

        .price-label {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="hero">
        <a href="/" class="back-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </a>
    </div>

    <div class="main-content">
        <div class="category-tag">План тренировок</div>
        <h1>{{ plan.title }}</h1>

        <p class="description">{{ plan.full_info }}</p>

        <div class="info-grid">
            <div class="info-card">
                <span>Срок</span>
                <strong>{{ plan.duration }}</strong>
            </div>
            <div class="info-card">
                <span>Интенсивность</span>
                <strong>{{ plan.intensity }}</strong>
            </div>
            <div class="info-card">
                <span>Локация</span>
                <strong>Дом / Зал</strong>
            </div>
            <div class="info-card">
                <span>Доступ</span>
                <strong>Навсегда</strong>
            </div>
        </div>

        <h3>Что включено:</h3>
        <ul class="features-list">
            <li>Видео-инструкции к упражнениям</li>
            <li>Рекомендации по питанию</li>
            <li>Поддержка в чате 24/7</li>
        </ul>
    </div>

    <div class="action-bar">
        <a href="/checkout/{{ plan_id }}" class="buy-button">
            <span>Начать программу</span>
            <span class="price-label">{{ plan.price }}</span>
        </a>
    </div>

</body>

</html>
