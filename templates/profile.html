<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мой Профиль | sm1le.fitness</title>
  <style>
    :root {
      --bg: #0F172A;
      --card-bg: #1E293B;
      --accent: #F97316;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --error: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    .app-wrapper {
      padding: 20px 16px 120px 16px;
      max-width: 500px;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .profile-header {
      text-align: center;
      margin-bottom: 25px;
    }

    #avatar-wrapper {
      position: relative;
      display: inline-block;
      width: 110px;
      height: 110px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    #avatar-wrapper:active { transform: scale(0.95); }

    img.avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }

    #avatar-overlay {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: var(--accent);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border: 3px solid var(--bg);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin: 10px 0 5px 4px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #334155;
      background: var(--card-bg);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
    }

    .grid-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #message {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
      min-height: 20px;
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-save {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }

    .btn-save:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* === НИЖНИЙ НАВБАР === */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 16px;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--text-muted);
      transition: 0.3s;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item span {
      font-size: 11px;
      font-weight: 500;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item.active svg {
      fill: var(--accent);
      filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4));
    }
  </style>
</head>

<body>

  <div class="app-wrapper">
    <div class="profile-header">
      <div id="avatar-wrapper" onclick="document.getElementById('avatar').click()">
        <img src="{{ user.avatar_url if user and user.avatar_url else '/static/default-avatar.png' }}" class="avatar" id="avatar-preview"
          onerror="this.src='/static/default-avatar.png'">
        <div id="avatar-overlay">📸</div>
      </div>
      <h1 id="display-username" style="margin: 0; font-size: 24px;">{{ user.username if user else 'Профиль' }}</h1>
      <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Настройки аккаунта</p>
    </div>

    <form id="profile-form">
      <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">

      <div class="form-section">
        <label>Имя пользователя</label>
        <input type="text" id="username" name="username" value="{{ user.username if user else '' }}" required>

        <label>Email</label>
        <input type="email" id="email" name="email" value="{{ user.email if user else '' }}" required>

        <label>Новый пароль</label>
        <input type="password" id="password" name="password" placeholder="Оставьте пустым, чтобы не менять">
      </div>

      <div class="grid-inputs">
        <div>
          <label>Вес (кг)</label>
          <input type="number" step="0.1" id="weight" name="weight"
            value="{{ user.weight if user and user.weight else '' }}" placeholder="0">
        </div>
        <div>
          <label>Рост (см)</label>
          <input type="number" id="height" name="height"
            value="{{ user.height if user and user.height else '' }}" placeholder="0">
        </div>
      </div>

      <input type="file" id="avatar" name="avatar" accept="image/*" style="display:none;">
      <div id="message"></div>

      <div class="btn-group">
        <button type="submit" class="btn-save" id="save-button" disabled>Сохранить изменения</button>
        <button type="button" class="btn-logout" id="logout-btn">Выйти из аккаунта</button>
      </div>
    </form>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      <span>Главная</span>
    </a>
    <a href="/auth/welcome" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
      </svg>
      <span>Планы</span>
    </a>
    <a href="/auth/profile" class="nav-item active">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Профиль</span>
    </a>
  </nav>

  <script>
    const form = document.getElementById('profile-form');
    const saveButton = document.getElementById('save-button');
    const avatarInput = document.getElementById('avatar');

    form.addEventListener('input', () => {
      saveButton.disabled = false;
    });

    avatarInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('avatar-preview').src = URL.createObjectURL(file);
        saveButton.disabled = false;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.textContent = 'Сохранение...';
      msg.style.color = 'var(--text-muted)';

      const formData = new FormData(form);
      try {
        const res = await fetch('/auth/profile', {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          msg.textContent = 'Успешно обновлено!';
          msg.style.color = 'var(--success)';
          saveButton.disabled = true;
          document.getElementById('display-username').innerText = document.getElementById('username').value;
        } else {
          const errorData = await res.json();
          msg.textContent = errorData.detail || 'Ошибка при сохранении';
          msg.style.color = 'var(--error)';
        }
      } catch (err) {
        msg.textContent = 'Ошибка сети';
        msg.style.color = 'var(--error)';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      if (confirm('Вы уверены, что хотите выйти?')) {
        // В auth.py эндпоинт /auth/logout
        await fetch('/auth/logout', { method: 'POST' });
        location.href = '/';
      }
    });
  </script>
</body>

</html>
