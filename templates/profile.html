<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мой Профиль | sm1le.fitness</title>
  <style>
    :root {
      --bg: #0F172A; --card-bg: #1E293B; --accent: #F97316;
      --text: #F8FAFC; --text-muted: #94A3B8; --error: #ef4444; --success: #22c55e;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
      font-family: -apple-system, sans-serif; min-height: 100vh;
    }
    .app-wrapper { padding: 20px 16px 100px 16px; max-width: 500px; margin: 0 auto; }
    .profile-header { text-align: center; margin-bottom: 25px; }
    
    #avatar-wrapper {
      position: relative; display: inline-block; width: 100px; height: 100px;
      margin-bottom: 15px; cursor: pointer;
    }
    img.avatar {
      width: 100px; height: 100px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--accent);
    }
    #avatar-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: 0.3s;
    }
    #avatar-wrapper:hover #avatar-overlay { opacity: 1; }

    .form-section { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin: 10px 0 5px 4px; }
    input, select {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155;
      background: var(--card-bg); color: white; font-size: 15px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    #message { text-align: center; margin: 10px 0; font-size: 14px; min-height: 20px; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    button {
      padding: 16px; border-radius: 14px; border: none; font-weight: 700;
      font-size: 15px; cursor: pointer; transition: 0.3s;
    }
    .btn-save { background: var(--accent); color: white; }
    .btn-save:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-logout { background: #334155; color: white; }

    .nav-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
      background: white; display: flex; justify-content: space-around; align-items: center;
      border-top-left-radius: 20px; border-top-right-radius: 20px;
    }
    .nav-item { text-decoration: none; color: #94A3B8; font-size: 11px; text-align: center; }
    .nav-item.active { color: var(--accent); }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="profile-header">
      <div id="avatar-wrapper" onclick="document.getElementById('avatar').click()">
        <img src="{{ avatar_url if avatar_url else '/static/default-avatar.png' }}" class="avatar" id="avatar-preview">
        <div id="avatar-overlay">📸</div>
      </div>
      <h1 id="display-username">{{ current_user.username if current_user else 'Профиль' }}</h1>
    </div>

    <form id="profile-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token if csrf_token else '' }}">
      
      <div class="form-section">
        <label>Имя пользователя</label>
        <input type="text" id="username" name="username" value="{{ current_user.username if current_user else '' }}" required>
        
        <label>Email</label>
        <input type="email" id="email" name="email" value="{{ current_user.email if current_user else '' }}" required>
        
        <label>Новый пароль</label>
        <input type="password" id="password" name="password" placeholder="Оставьте пустым, чтобы не менять">
      </div>

      <div class="grid-inputs">
        <div>
          <label>Вес (кг)</label>
          <input type="number" step="0.1" id="weight" name="weight" value="{{ current_user.weight if current_user and current_user.weight else '' }}">
        </div>
        <div>
          <label>Рост (см)</label>
          <input type="number" id="height" name="height" value="{{ current_user.height if current_user and current_user.height else '' }}">
        </div>
      </div>

      <input type="file" id="avatar" name="avatar" accept="image/*" style="display:none;">
      <div id="message"></div>

      <div class="btn-group">
        <button type="submit" class="btn-save" id="save-button" disabled>Сохранить</button>
        <button type="button" class="btn-logout" id="logout-btn">Выйти</button>
      </div>
    </form>
  </div>

  <nav class="nav-bar">
    <a href="/" class="nav-item"><span>Главная</span></a>
    <a href="/workouts" class="nav-item"><span>Планы</span></a>
    <a href="/auth/profile" class="nav-item active"><span>Профиль</span></a>
  </nav>

  <script>
    const form = document.getElementById('profile-form');
    const saveButton = document.getElementById('save-button');
    const avatarInput = document.getElementById('avatar');

    // Следим за изменениями
    form.addEventListener('input', () => {
      saveButton.disabled = false;
    });

    // Превью аватара
    avatarInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('avatar-preview').src = URL.createObjectURL(file);
        saveButton.disabled = false;
      }
    });

    // Отправка формы
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      msg.textContent = 'Сохранение...';
      
      const formData = new FormData(form);
      try {
        const res = await fetch('/auth/profile', {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          msg.textContent = 'Успешно обновлено!';
          msg.style.color = 'var(--success)';
          setTimeout(() => location.href = '/', 1000);
        } else {
          msg.textContent = 'Ошибка при сохранении';
          msg.style.color = 'var(--error)';
        }
      } catch (err) {
        msg.textContent = 'Ошибка сети';
      }
    });

    // Выход
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      location.href = '/';
    });
  </script>
</body>
</html>
